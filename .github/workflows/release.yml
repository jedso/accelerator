name: Release

on:
  workflow_dispatch:
  push:
    branches: [ master, release_ci ]

jobs:
  main-ci:
    uses: ./.github/workflows/ci.yml
    with:
      release: true

  release:
    permissions: write-all
    runs-on: ubuntu-latest
    needs: [ main-ci ]

    env:
      PROJECT: 'accelerator'
    steps:
      - run: sudo apt-get install -y tree

      - uses: actions/checkout@v4
        name: Repository checkout
        with:
          fetch-depth: 0
          path: repository
      
      - name: Download Linux release
        uses: actions/download-artifact@v5
        with:
          name: accelerator_linux
          path: linux

      - name: Zip release again
        run: |
          cd repository
          read -r PRODUCT_VERSION < ./product.version
          REV_COUNT=$(git rev-list --count HEAD)
          REV_SHA=$(git rev-parse --short HEAD)
          cd ..
          LINUX_ZIP="${{ env.PROJECT }}-$PRODUCT_VERSION-git$REV_COUNT-$REV_SHA-linux.zip"
          zip -r ${LINUX_ZIP} linux

          echo "LINUX_ZIP=${LINUX_ZIP}" >> $GITHUB_ENV
          echo "RELEASE_TAG=v$PRODUCT_VERSION-git$REV_COUNT" >> $GITHUB_ENV
          echo "RELEASE_NAME=${{ env.PROJECT }} v$PRODUCT_VERSION (git$REV_COUNT-$REV_SHA)" >> $GITHUB_ENV

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ env.RELEASE_TAG }}" \
            --repo "${{ github.repository }}" \
            --title "${{ env.RELEASE_NAME }}" \
            --notes "Automated release from branch \`${{ github.ref_name }}\`." \
            --prerelease \
            "${{ env.LINUX_ZIP }}"
